<div class="flex flex-row gap-2 mt-2">
  <!-- Aqui mostrara component search-->
  <country-search-input placeholder="Buscar capital de mi pais" (value)="query.set($event)" />
</div>

<section>
  @if (countryResource.error()) {
    <div class="alert alert-error mt-5">
      <div>
        <span>Ocurrió un error: {{ countryResource.error() }}</span>
      </div>
    </div>
  }
  @if (countryResource.hasValue()) {
    <country-list [countries]="countryResource.value()!" />
  }
</section>
