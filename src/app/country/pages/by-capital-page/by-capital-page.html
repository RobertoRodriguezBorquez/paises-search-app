<div class="flex flex-row gap-2 mt-2">
  <!-- Aqui mostrara component search-->
  <country-search-input placeholder="Buscar capital de mi pais" (value)="onSearch($event)" />
</div>

<section>

  @if (isError()) {
    <div class="alert alert-error mt-5">
      <div>
        <span>Ocurrió un error: {{ isError() }}</span>
      </div>
    </div>

  }
  <!--  Aquí se traera el component country-list -->
  <country-list [countries]="countries()" />
</section>
